<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang chủ</title>

    <!-- Bootstrap + Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #0b0c10;
        color: #c5c6c7;
      }

      .hero-section {
        background: radial-gradient(circle at top right, #1f2833, #0b0c10);
        padding: 6rem 0;
        border-radius: 15px;
        margin-top: 1rem;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(102, 252, 241, 0.1);
        box-shadow: 0 0 40px rgba(102, 252, 241, 0.05);
      }

      .hero-title {
        font-weight: 900;
        font-size: 3.5rem;
        margin-bottom: 1.5rem;
        color: #ffffff;
      }

      .text-gradient {
        background: linear-gradient(to right, #66fcf1, #45a29e, #9d00ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: hueRotate 5s infinite linear;
      }

      @keyframes hueRotate {
        0% {
          filter: hue-rotate(0deg);
        }
        100% {
          filter: hue-rotate(360deg);
        }
      }

      .btn-hero {
        background: linear-gradient(45deg, #66fcf1, #45a29e);
        color: #000;
        padding: 1rem 2.5rem;
        border-radius: 50px;
        text-decoration: none;
        font-weight: bold;
      }

      .feature-box {
        padding: 2rem;
        border-radius: 15px;
        background: rgba(31, 40, 51, 0.5);
        transition: 0.3s;
      }

      .feature-box:hover {
        transform: translateY(-10px);
      }
    </style>
  </head>

  <body>
    <div class="container mt-4">
      <div class="hero-section text-center">
        <h1 class="hero-title">
          Định Hình <span class="text-gradient">Tương Lai</span>
        </h1>
        <p>Chào mừng đến với Thanhtho Corporation</p>

        <!-- SỬA LINK -->
        <a href="#" class="btn-hero">Khám phá</a>
      </div>

      <div class="row mt-5">
        <div class="col-md-3">
          <div class="feature-box text-center">
            <i class="bi bi-rocket"></i>
            <h5>Giao nhanh</h5>
          </div>
        </div>

        <div class="col-md-3">
          <div class="feature-box text-center">
            <i class="bi bi-shield"></i>
            <h5>Bảo hành</h5>
          </div>
        </div>

        <div class="col-md-3">
          <div class="feature-box text-center">
            <i class="bi bi-arrow-repeat"></i>
            <h5>Đổi trả</h5>
          </div>
        </div>

        <div class="col-md-3">
          <div class="feature-box text-center">
            <i class="bi bi-headset"></i>
            <h5>Hỗ trợ</h5>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
